<!DOCTYPE html>
<html>
<head>
    <title>Cookie Demo</title>
    <style>
        body {
            font-family: Arial;
        }
        .box {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        input {
            margin-top: 10px;
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Enter Your Name</h2>

    <form action="CookieServlet" method="get">
        <label>Name:</label><br>
        <input type="text" name="userName" required><br><br>

        <input type="submit" value="Submit">
    </form>
</div>

</body>
</html>
